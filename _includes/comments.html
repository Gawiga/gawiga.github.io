<section class="comments">
    <h3>Comentários</h3>
    <div id="disqus_thread"></div>
    <button type="button" id="load-comments" class="btn">
        Carregar comentarios
    </button>
</section>
<script>
    var disqusLoaded = false;
    var disqusButton = document.getElementById('load-comments');

    function loadDisqus() {
        if (disqusLoaded) {
            return;
        }

        disqusLoaded = true;
        disqusButton.disabled = true;
        disqusButton.textContent = 'Comentarios carregados';

        window.disqus_config = function () {
            this.page.url = '{{ site.url }}{{ site.baseurl }}{{ page.url }}';
            this.page.identifier = '{{ page.url }}';
        };

        var d = document;
        var s = d.createElement('script');
        s.src = 'https://gawiga-com.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
    }

    if (disqusButton) {
        disqusButton.addEventListener('click', loadDisqus);
    }
</script>
<noscript>Por favor, habilite o javascript <a href="https://disqus.com/?ref_noscript"> para comentar e habilitar o Disqus.</a></noscript>
